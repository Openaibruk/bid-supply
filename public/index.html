<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Bid Supply — Live Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:#08080c;color:#e5e5e5;min-height:100vh;-webkit-font-smoothing:antialiased}
.bg-glow{position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse 70% 40% at 50% 0%,rgba(99,102,241,.05),transparent 70%)}
header{position:sticky;top:0;z-index:50;border-bottom:1px solid rgba(255,255,255,.06);background:rgba(8,8,12,.92);backdrop-filter:blur(20px)}
.header-inner{max-width:1100px;margin:0 auto;padding:0 16px;height:48px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,#6366f1,#7c3aed);display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px rgba(99,102,241,.3)}
.logo-icon span{color:#fff;font-weight:800;font-size:10px}
.logo h1{font-size:14px;font-weight:700;letter-spacing:-.02em;color:#fff}
.live-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.15)}
.live-dot{width:6px;height:6px;border-radius:50%;background:#22c55e;animation:pulse-dot 2s ease-in-out infinite}
@keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.3)}}
.live-text{font-size:9px;font-weight:700;color:#22c55e;letter-spacing:.1em}
.lang-btn{padding:4px 10px;border-radius:6px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);color:#999;font-size:11px;cursor:pointer;transition:all .2s}
.lang-btn:hover{background:rgba(255,255,255,.08);color:#ccc}
.ticker{overflow:hidden;border-bottom:1px solid rgba(255,255,255,.04);background:rgba(255,255,255,.01)}
@keyframes ticker{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
main{max-width:1100px;margin:0 auto;padding:20px 16px 40px}
.grid-4{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:20px}
.card{position:relative;border-radius:16px;border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.02);overflow:hidden}
.card-inner{padding:16px}
.card-icon{font-size:18px;margin-bottom:6px}
.card-label{font-size:10px;font-weight:600;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.1em}
.card-value{font-size:32px;font-weight:800;color:#fff;margin:4px 0 2px;letter-spacing:-.03em}
.card-sub{font-size:10px;color:rgba(255,255,255,.2)}
.tabs{display:flex;gap:2px;background:rgba(255,255,255,.02);padding:3px;border-radius:12px;border:1px solid rgba(255,255,255,.05);margin-bottom:20px;width:fit-content}
.tab{padding:6px 16px;border-radius:8px;font-size:11px;font-weight:600;color:rgba(255,255,255,.25);cursor:pointer;transition:all .2s;border:none;background:transparent}
.tab.active{background:rgba(99,102,241,.15);color:#818cf8}
.tab:hover:not(.active){color:rgba(255,255,255,.5)}
.panel{display:none}
.panel.active{display:block}
.section{border-radius:16px;border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.02);margin-bottom:16px;overflow:hidden}
.section-header{padding:16px 20px;border-bottom:1px solid rgba(255,255,255,.04);display:flex;align-items:center;gap:8px}
.section-title{font-size:10px;font-weight:700;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.1em}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:10px 20px 8px;font-size:9px;font-weight:600;color:rgba(255,255,255,.15);text-transform:uppercase;letter-spacing:.1em}
td{padding:12px 20px;border-top:1px solid rgba(255,255,255,.03);font-size:13px}
tr:hover td{background:rgba(255,255,255,.02)}
.win-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:999px;background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.15);font-size:9px;font-weight:700;color:#22c55e}
.price{font-weight:700;color:#818cf8;font-family:'SF Mono',Consolas,monospace;font-size:13px}
.etb{color:rgba(255,255,255,.2);font-size:10px;margin-left:3px}
.product-name{color:#f5f5f5;font-weight:500}
.supplier-name{color:rgba(255,255,255,.4)}
.medal{font-size:16px;width:28px;text-align:center;display:inline-block}
.progress-bg{height:3px;background:rgba(255,255,255,.04);border-radius:99px;overflow:hidden;margin-top:8px}
.progress-fill{height:100%;background:linear-gradient(90deg,#6366f1,#8b5cf6);border-radius:99px;transition:width .5s}
.cycle-card{padding:12px 0}
.cycle-name{font-size:13px;font-weight:600;color:rgba(255,255,255,.7)}
.cycle-dates{font-size:9px;color:rgba(255,255,255,.15);margin-top:4px;display:flex;justify-content:space-between}
.cycle-left{font-size:10px;color:#818cf8;font-weight:600}
.loading{display:flex;align-items:center;justify-content:center;min-height:60vh;flex-direction:column;gap:16px}
.loading-spinner{width:32px;height:32px;border:2px solid rgba(255,255,255,.05);border-top-color:#6366f1;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:12px;color:rgba(255,255,255,.2)}
.chart-bar-bg{height:60px;display:flex;align-items:flex-end;gap:3px;padding:0 10px}
.chart-bar{flex:1;border-radius:3px;background:linear-gradient(0deg,rgba(34,197,94,.1),rgba(34,197,94,.5));min-height:2px;transition:height .3s}
.chart-label{display:flex;gap:3px;padding:0 10px;margin-top:4px}
.chart-label span{flex:1;text-align:center;font-size:8px;color:rgba(255,255,255,.15)}
.no-data{text-align:center;padding:40px;color:rgba(255,255,255,.15);font-size:13px}
@media(max-width:640px){.grid-4{grid-template-columns:repeat(2,1fr)}.card-value{font-size:24px}th,td{padding:8px 12px;font-size:12px}.section-header{padding:12px 16px}}
</style>
</head>
<body>
<div class="bg-glow"></div>
<header>
<div class="header-inner">
<div class="logo">
<div class="logo-icon"><span>BS</span></div>
<h1>Bid Supply</h1>
</div>
<div style="display:flex;align-items:center;gap:12px">
<div class="live-badge"><span class="live-dot"></span><span class="live-text">LIVE</span></div>
<button class="lang-btn" onclick="toggleLang()">🇬🇧 EN</button>
</div>
</div>
</header>
<div class="ticker" id="ticker"></div>
<main id="app">
<div class="loading" id="loader"><div class="loading-spinner"></div><div class="loading-text">Loading data...</div></div>
</main>
<script>
const API='https://ckckcqszswqcyswctkab.supabase.co/rest/v1';
const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNrY2tjcXN6c3dxY3lzd2N0a2FiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDk3Mjk3NjEsImV4cCI6MjA2NTMwNTc2MX0.av4gcddK_C9PO4KbzjjxwqLed2RCHVTSEhjHZt0hZAM';
const H={apikey:KEY,Authorization:'Bearer '+KEY};
let lang='en';
const T={en:{title:'Bid Supply',live:'LIVE',bids:'Bids',products:'Products',suppliers:'Suppliers',cycles:'Cycles',winners:'Winners',overview:'Overview',charts:'Price Trends',rankings:'Rankings',latestWinners:'Recent Winners',supplierRank:'Supplier Standings',priceTrend:'Avg Bid Price',bidVol:'Bid Volume',cycleProgress:'Active Cycles',noData:'No data yet',etb:'ETB',remaining:'left',total:'total',registered:'registered',updated:'Updated'},
am:{title:'ቢድ ሳፕላይ',live:'ቀጥታ',bids:'ዋጋዎች',products:'ምርቶች',suppliers:'አቅራቢዎች',cycles:'ዑደቶች',winners:'አሸናፊዎች',overview:'አጠቃላይ',charts:'ዋጋ አዝማሚያ',rankings:'ደረጃ',latestWinners:'የቅርብ አሸናፊዎች',supplierRank:'የአቅራቢ ደረጃ',priceTrend:'አማካይ ዋጋ',bidVol:'የዋጋ ብዛት',cycleProgress:'ንቁ ዑደቶች',noData:'ዳታ የለም',etb:'ብር',remaining:'ቀርቷል',total:'ጠቅላላ',registered:'የተመዘገቡ',updated:'የተሻሻለ'}};
let bids=[],products=[],suppliers=[],cycles=[],tab=0;
function t(k){return T[lang]?.[k]||k}
function pName(id){const p=products.find(x=>+x.product_id===+id);return p?p.product_name:'#'+id}
function sName(id){const s=suppliers.find(x=>+x.supplier_id===+id);return s?s.supplier_name:'#'+id}
let currentTab=0;

async function load(){
try{
const [p,s,c,b]=await Promise.all([
fetch(API+'/products?select=product_id,product_name&limit=500',{headers:H}).then(r=>r.json()),
fetch(API+'/dc_suppliers?select=supplier_id,supplier_name&limit=500',{headers:H}).then(r=>r.json()),
fetch(API+'/dc_bidding_cycles?select=cycle_id,cycle_name,starts_at,ends_at&order=ends_at.asc',{headers:H}).then(r=>r.json()),
fetch(API+'/dc_bids?select=id,bid_price,is_winner,product_id,supplier_id,created_at,volume&order=created_at.desc&limit=300',{headers:H}).then(r=>r.json())
]);
products=Array.isArray(p)?p:[];
suppliers=Array.isArray(s)?s:[];
cycles=Array.isArray(c)?c:[];
bids=Array.isArray(b)?b:[];
render();
}catch(e){
document.getElementById('app').innerHTML='<div class="loading"><div style="color:#ef4444">Error: '+e.message+'</div><button class="lang-btn" onclick="load()" style="margin-top:12px">Retry</button></div>';
}}

function render(){
const now=Date.now();
const winners=bids.filter(b=>b.is_winner);
const uniqueProds=new Set(bids.map(b=>b.product_id));
const uniqueSupps=new Set(bids.map(b=>b.supplier_id));
const activeCycles=cycles.filter(c=>new Date(c.starts_at).getTime()<=now&&new Date(c.ends_at).getTime()>=now);

// Ticker
const tickerItems=[...bids,...bids].slice(0,40).map((b,i)=>`<span style="display:inline-flex;align-items:center;gap:6px;padding:0 16px;font-size:12px;white-space:nowrap"><span>${b.is_winner?'<span style="color:#f59e0b">🏆</span>':'<span style="width:5px;height:5px;border-radius:50%;background:rgba(99,102,241,.5);display:inline-block"></span>'}</span><span style="color:rgba(255,255,255,.7);font-weight:500">${pName(b.product_id)}</span><span style="color:#818cf8;font-weight:700;font-family:monospace">${b.bid_price.toLocaleString()}</span><span style="color:rgba(255,255,255,.2);font-size:10px">${t('etb')}</span><span style="color:rgba(255,255,255,.15)">·</span><span style="color:rgba(255,255,255,.3);font-size:11px">${sName(b.supplier_id)}</span></span>`).join('');
document.getElementById('ticker').innerHTML=`<div style="display:flex;gap:0;padding:8px 0;white-space:nowrap;${bids.length>0?'animation:ticker 40s linear infinite;width:fit-content':''}">'${tickerItems}'+tickerItems'</div>`;

// Stats
const stats=[
{icon:'🎯',label:t('bids'),val:bids.length,sub:winners.length+' '+t('winners')},
{icon:'📦',label:t('products'),val:uniqueProds.size,sub:products.length+' '+t('total')},
{icon:'👥',label:t('suppliers'),val:uniqueSupps.size,sub:suppliers.length+' '+t('registered')},
{icon:'⚡',label:t('cycles'),val:activeCycles.length,sub:cycles.length+' '+t('total')}
];

let html=`<div class="grid-4">${stats.map(s=>`<div class="card"><div class="card-inner"><div class="card-icon">${s.icon}</div><div class="card-label">${s.label}</div><div class="card-value">${s.val.toLocaleString()}</div><div class="card-sub">${s.sub}</div></div></div>`).join('')}</div>`;

// Tabs
html+=`<div class="tabs"><button class="tab ${currentTab===0?'active':''}" onclick="switchTab(0)">📊 ${t('overview')}</button><button class="tab ${currentTab===1?'active':''}" onclick="switchTab(1)">📈 ${t('charts')}</button><button class="tab ${currentTab===2?'active':''}" onclick="switchTab(2)">🏅 ${t('rankings')}</button></div>`;

// Overview tab
html+=`<div class="panel ${currentTab===0?'active':''}">`;
// Winners
const recentWinners=winners.slice(0,10);
html+=`<div class="section"><div class="section-header"><span>🏆</span><span class="section-title">${t('latestWinners')}</span></div>`;
if(recentWinners.length){
html+=`<table><tr><th>${lang==='en'?'Product':'ምርት'}</th><th>${lang==='en'?'Supplier':'አቅራቢ'}</th><th style="text-align:right">${lang==='en'?'Price':'ዋጋ'}</th><th style="text-align:right">${lang==='en'?'Status':'ሁኔታ'}</th></tr>`;
recentWinners.forEach(w=>{
html+=`<tr><td><span class="product-name">${pName(w.product_id)}</span><br><span style="font-size:10px;color:rgba(255,255,255,.15)">${new Date(w.created_at).toLocaleDateString()}</span></td><td><span class="supplier-name">${sName(w.supplier_id)}</span></td><td style="text-align:right"><span class="price">${w.bid_price.toLocaleString()}</span><span class="etb">${t('etb')}</span></td><td style="text-align:right"><span class="win-badge">🏆 Winner</span></td></tr>`;
});
html+='</table>';}else{html+=`<div class="no-data">${t('noData')}</div>`;}
html+='</div>';

// Cycles
if(activeCycles.length){
html+=`<div class="section"><div class="section-header"><span>⚡</span><span class="section-title">${t('cycleProgress')}</span></div><div style="padding:16px 20px;display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:16px">`;
activeCycles.forEach(c=>{
const total=Math.max(1,(new Date(c.ends_at).getTime()-new Date(c.starts_at).getTime())/864e5);
const left=Math.max(0,Math.ceil((new Date(c.ends_at).getTime()-now)/864e5));
const pct=Math.min(100,((total-left)/total)*100);
html+=`<div><div style="display:flex;justify-content:space-between;align-items:center"><span class="cycle-name">${c.cycle_name}</span><span class="cycle-left">${left}d ${t('remaining')}</span></div><div class="progress-bg"><div class="progress-fill" style="width:${pct}%"></div></div><div class="cycle-dates"><span>${c.starts_at.slice(5,10)}</span><span>${pct.toFixed(0)}%</span><span>${c.ends_at.slice(5,10)}</span></div></div>`;
});
html+='</div></div>';}
html+='</div>';

// Charts tab
html+=`<div class="panel ${currentTab===1?'active':''}">`;
// Volume data for last 14 days
const volMap={};const cutoff=Date.now()-14*864e5;
bids.filter(b=>new Date(b.created_at).getTime()>=cutoff).forEach(b=>{const d=b.created_at.slice(5,10);volMap[d]=(volMap[d]||0)+1;});
const volData=Object.entries(volMap).sort(([a],[b])=>a.localeCompare(b)).slice(-12);
const maxVol=Math.max(...volData.map(d=>d[1]),1);
if(volData.length){
html+=`<div class="section"><div class="section-header"><span>📈</span><span class="section-title">${t('bidVol')} (${lang==='en'?'last 14 days':'በ14 ቀናት'})</span></div><div style="padding:20px"><div class="chart-bar-bg" style="height:80px">${volData.map(d=>`<div class="chart-bar" style="height:${(d[1]/maxVol)*100}%" title="${d[1]}"></div>`).join('')}</div><div class="chart-label">${volData.map(d=>`<span>${d[0].slice(3)}</span>`).join('')}</div></div></div>`;
}else{html+=`<div class="no-data">${t('noData')}</div>`;}
html+='</div>';

// Rankings tab
const lb={};
bids.forEach(b=>{if(!lb[b.supplier_id])lb[b.supplier_id]={bids:0,wins:0};lb[b.supplier_id].bids++;if(b.is_winner)lb[b.supplier_id].wins++;});
const leaderboard=Object.entries(lb).map(([id,v])=>({id:+id,...v,rate:v.bids?(v.wins/v.bids)*100:0})).filter(r=>r.bids>0).sort((a,b)=>b.wins-a.wins).slice(0,10);
const medals=['🥇','🥈','🥉'];
html+=`<div class="panel ${currentTab===2?'active':''}"><div class="section">`;
if(leaderboard.length){
html+=`<div class="section-header"><span>🏅</span><span class="section-title">${t('supplierRank')}</span></div><table><tr><th style="width:40px">#</th><th>${lang==='en'?'Supplier':'አቅራቢ'}</th><th style="text-align:right">${lang==='en'?'Bids':'ዋጋዎች'}</th><th style="text-align:right">${lang==='en'?'Wins':'አሸናፊዎች'}</th><th style="text-align:right">${lang==='en'?'Win Rate':'የማሸነፍ መጠን'}</th></tr>`;
leaderboard.forEach((r,i)=>{
html+=`<tr><td><span class="medal">${i<3?medals[i]:i+1}</span></td><td><span style="color:rgba(255,255,255,.7);font-weight:500">${sName(r.id)}</span></td><td style="text-align:right;color:rgba(255,255,255,.3)">${r.bids}</td><td style="text-align:right;color:rgba(255,255,255,.6);font-weight:600">${r.wins}</td><td style="text-align:right"><span style="color:#22c55e;font-weight:700">${r.rate.toFixed(0)}%</span></td></tr>`;
});
html+='</table>';}else{html+=`<div class="no-data">${t('noData')}</div>`;}
html+='</div></div>';

document.getElementById('app').innerHTML=html;
}

function switchTab(n){currentTab=n;render();}
function toggleLang(){lang=lang==='en'?'am':'en';document.querySelector('.lang-btn').textContent=lang==='en'?'🇬🇧 EN':'🇪🇹 አማ';render();}

// Init
load();
setInterval(load,60000);
</script>
</body>
</html>
