<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Bid Supply — Live Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:#f1f5f9;color:#1e293b;min-height:100vh;-webkit-font-smoothing:antialiased}
header{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.9);backdrop-filter:blur(20px);border-bottom:1px solid #e2e8f0}
.header-inner{max-width:1200px;margin:0 auto;padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,#6366f1,#7c3aed);display:flex;align-items:center;justify-content:center;box-shadow:0 1px 3px rgba(99,102,241,.3)}
.logo-icon span{color:#fff;font-weight:800;font-size:11px}
.logo h1{font-size:15px;font-weight:700;color:#0f172a;letter-spacing:-.02em}
.live-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:99px;background:#ecfdf5;border:1px solid #bbf7d0}
.live-dot{width:5px;height:5px;border-radius:50%;background:#22c55e;animation:pdot 2s ease-in-out infinite}
@keyframes pdot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.5)}}
.live-text{font-size:9px;font-weight:700;color:#16a34a;letter-spacing:.05em}
.lang-btn{padding:4px 10px;border-radius:6px;background:#f8fafc;border:1px solid #e2e8f0;color:#64748b;font-size:12px;cursor:pointer;transition:all .2s;font-weight:500}
.lang-btn:hover{background:#e2e8f0}
.ticker{overflow:hidden;background:#fff;border-bottom:1px solid #e2e8f0}
@keyframes tic{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
main{max-width:1200px;margin:0 auto;padding:24px 20px 48px}
.hero{position:relative;background:linear-gradient(135deg,#1e40af,#3730a3);border-radius:20px;padding:28px 32px;color:#fff;margin-bottom:24px;overflow:hidden;box-shadow:0 4px 24px rgba(30,64,175,.15)}
.hero::before{content:'';position:absolute;top:-50%;right:-20%;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.08),transparent 60%)}
.hero-label{font-size:11px;text-transform:uppercase;letter-spacing:.12em;opacity:.6;margin-bottom:6px}
.hero-value{font-size:42px;font-weight:800;letter-spacing:-.04em;line-height:1}
.hero-sub{display:flex;gap:20px;margin-top:12px;flex-wrap:wrap}
.hero-stat{font-size:12px;opacity:.8}
.hero-stat strong{font-weight:700;opacity:1;color:#93c5fd}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.stat-card{background:#fff;border:1px solid #e2e8f0;border-radius:14px;padding:18px 20px;box-shadow:0 1px 2px rgba(0,0,0,.04);transition:box-shadow .2s}
.stat-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.06)}
.stat-icon{font-size:18px;margin-bottom:6px}
.stat-label{font-size:11px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.06em}
.stat-value{font-size:28px;font-weight:800;color:#0f172a;margin:4px 0 2px;letter-spacing:-.04em}
.stat-sub{font-size:11px;color:#94a3b8}
.section{background:#fff;border:1px solid #e2e8f0;border-radius:14px;margin-bottom:20px;overflow:hidden;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.section-head{padding:16px 20px 12px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;gap:8px}
.section-title{font-size:11px;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:.08em}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:8px 20px;font-size:10px;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.06em}
td{padding:10px 20px;border-top:1px solid #f1f5f9;font-size:13px;vertical-align:middle}
tbody tr:hover td{background:#f8fafc}
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:99px;font-size:9px;font-weight:700}
.badge-win{background:#ecfdf5;color:#16a34a;border:1px solid #bbf7d0}
.badge-loc{background:#eff6ff;color:#2563eb;border:1px solid #bfdbfe}
.badge-type{background:#fef3c7;color:#d97706;border:1px solid #fde68a}
.name{color:#0f172a;font-weight:500}
.muted{color:#94a3b8;font-size:11px}
.price{font-weight:700;color:#4f46e5;font-family:'SF Mono',Consolas,monospace;font-size:13px}
.medal{font-size:16px;width:24px;text-align:center;display:inline-block}
.progress-bg{height:4px;background:#f1f5f9;border-radius:99px;overflow:hidden;margin-top:8px}
.progress-fill{height:100%;background:linear-gradient(90deg,#6366f1,#8b5cf6);border-radius:99px}
.schedule-card{background:linear-gradient(135deg,#f0f9ff,#ede9fe);border:1px solid #e2e8f0;border-radius:14px;padding:20px 24px;margin-bottom:16px}
.schedule-label{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:#64748b;font-weight:600}
.schedule-value{font-size:18px;font-weight:700;color:#0f172a;margin-top:6px}
.vol-bar{display:flex;align-items:flex-end;gap:3px;height:60px;padding:0 20px}
.vol-bar-item{flex:1;border-radius:3px 3px 0 0;background:linear-gradient(0deg,#e0e7ff,#c7d2fe);min-height:2px}
.vol-labels{display:flex;gap:3px;padding:0 20px;margin-top:4px}
.vol-labels span{flex:1;text-align:center;font-size:8px;color:#94a3b8}
.loading{display:flex;align-items:center;justify-content:center;min-height:70vh;flex-direction:column;gap:16px}
.spinner{width:32px;height:32px;border:2px solid #e2e8f0;border-top-color:#6366f1;border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
footer{text-align:center;padding:24px 0;border-top:1px solid #e2e8f0;color:#cbd5e1;font-size:10px}
@media(max-width:640px){.stats{grid-template-columns:repeat(2,1fr)}.stat-value{font-size:22px}.hero-value{font-size:32px}th,td{padding:8px 12px;font-size:12px}}
</style>
</head>
<body>
<header><div class="header-inner">
<div class="logo"><div class="logo-icon"><span>BS</span></div><h1>Bid Supply</h1></div>
<div style="display:flex;align-items:center;gap:10px"><div class="live-badge"><span class="live-dot"></span><span class="live-text">LIVE</span></div>
<button class="lang-btn" onclick="toggleLang()">🇬🇧 EN</button></div></div></header>
<div class="ticker" id="ticker" style="display:none"></div>
<main id="app"><div class="loading"><div class="spinner"></div><div style="color:#94a3b8;font-size:13px">Loading data...</div></div></main>
<script>
const API='https://ckckcqszswqcyswctkab.supabase.co/rest/v1';
const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNrY2tjcXN6c3dxY3lzd2N0a2FiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDk3Mjk3NjEsImV4cCI6MjA2NTMwNTc2MX0.av4gcddK_C9PO4KbzjjxwqLed2RCHVTSEhjHZt0hZAM';
const H={apikey:KEY,Authorization:'Bearer '+KEY};
let lang='am',bids=[],products=[],suppliers=[],cycles=[];
const T={en:{todayBids:'Bids Today',products:'Products',suppliers:'Suppliers',cycles:'Active Cycles',winners:'Winners',latestWinners:'Recent Winning Bids',recentBids:'Latest Live Bids',supplierRank:'Supplier Leaderboard',bidVol:'Bid Volume (14d)',cycleProgress:'Active Cycles',nextBid:'Next Bid Schedule',allBids:'Total Bids',noData:'No data yet',etb:'ETB',remaining:'remaining',total:'total',registered:'registered',updated:'Last updated',product:'Product',supplier:'Supplier',price:'Price',volume:'Volume',status:'Status',source:'Source',location:'Location',region:'Region',payment:'Payment',damage:'Damage',todayStatus:'Today’s Market Status',activeNow:'Active bidding now',todayProducts:'Products on bid today',sourceSummary:'Source Summary',cycleCompare:'Cycle & Product Comparison'},
am:{todayBids:'ዛሬ የገቡ ዋጋዎች',products:'ምርቶች',suppliers:'አቅራቢዎች',cycles:'ንቁ ዑደቶች',winners:'አሸናፊዎች',latestWinners:'የቅርብ ጊዜ አሸናፊ ዋጋዎች',recentBids:'የቅርብ የገቡ ዋጋዎች',supplierRank:'የአቅራቢ ደረጃ',bidVol:'የ14 ቀን የዋጋ ብዛት',cycleProgress:'ንቁ የጨረታ ዑደቶች',nextBid:'ቀጣይ የጨረታ ሰንጠረዥ',allBids:'ጠቅላላ ዋጋዎች',noData:'ዳታ የለም',etb:'ብር',remaining:'ቀርቷል',total:'ጠቅላላ',registered:'የተመዘገቡ',updated:'የተሻሻለበት ጊዜ',product:'ምርት',supplier:'አቅራቢ',price:'ዋጋ',volume:'መጠን',status:'ሁኔታ',source:'ምንጭ',location:'የመጣበት ቦታ',region:'ክልል',payment:'የክፍያ ጊዜ',damage:'ጉዳት',todayStatus:'የዛሬ የገበያ ሁኔታ',activeNow:'አሁን በጨረታ ላይ',todayProducts:'ዛሬ በጨረታ ላይ ያሉ ምርቶች',sourceSummary:'የምንጭ ማጠቃለያ',cycleCompare:'የዑደት እና የምርት ንፅፅር'}};
function t(k){return T[lang]?.[k]||k}
function pName(id){const p=products.find(x=>+x.product_id===+id);return p?p.product_name:'#'+id}
function sName(id){const s=suppliers.find(x=>+x.supplier_id===+id);return s?s.supplier_name:'#'+id}
function locLabel(v){const m={farm:'🌾 Farm',agent:'🤝 Agent',supplier:'🏢 Supplier'};return m[v]||v||'—'}
async function load(){try{
const[p,s,c,b]=await Promise.all([
fetch(API+'/products?select=product_id,product_name&limit=500',{headers:H}).then(r=>r.json()),
fetch(API+'/dc_suppliers?select=supplier_id,supplier_name&limit=500',{headers:H}).then(r=>r.json()),
fetch(API+'/dc_bidding_cycles?select=cycle_id,cycle_name,starts_at,ends_at&order=ends_at.asc',{headers:H}).then(r=>r.json()),
fetch(API+'/dc_bids?select=id,bid_price,is_winner,product_id,supplier_id,sourcing_location,source_name,source_region,payment_term,damage_type,volume,created_at&order=created_at.desc&limit=300',{headers:H}).then(r=>r.json())]);
products=Array.isArray(p)?p:[];suppliers=Array.isArray(s)?s:[];cycles=Array.isArray(c)?c:[];bids=Array.isArray(b)?b:[];render();
}catch(e){document.getElementById('app').innerHTML='<div class="loading"><div style="color:#dc2626">Error: '+e.message+'</div><button class="lang-btn" onclick="load()" style="margin-top:12px">Retry</button></div>';}}

function render(){
const now=new Date().getTime();
const todayKey=new Date().toISOString().slice(0,10);
const todayBids=bids.filter(b=>String(b.created_at).startsWith(todayKey));
const winners=bids.filter(b=>b.is_winner);
const todayWinners=todayBids.filter(b=>b.is_winner);
const uniqueProds=new Set(todayBids.map(b=>b.product_id));
const uniqueSupps=new Set(todayBids.map(b=>b.supplier_id));
const activeCycles=cycles.filter(c=>new Date(c.starts_at).getTime()<=now&&new Date(c.ends_at).getTime()>=now);
const totalVolume=todayBids.reduce((s,b)=>s+(b.volume||0),0);
const avgPrice=todayBids.length?Math.round((todayBids.reduce((s,b)=>s+b.bid_price,0)/todayBids.length)*100)/100:0;

// Next schedule
let nextSchedule='';
const upcomingCycles=cycles.filter(c=>new Date(c.starts_at).getTime()>now).sort((a,b)=>new Date(a.starts_at)-new Date(b.starts_at));
if(upcomingCycles.length){
const n=upcomingCycles[0];
const daysLeft=Math.ceil((new Date(n.starts_at).getTime()-now)/864e5);
nextSchedule=`<div class="schedule-card"><div class="schedule-label">${t('nextBid')}</div><div class="schedule-value">${n.cycle_name}</div><div class="muted" style="margin-top:4px">${daysLeft===0?'Starts today':daysLeft===1?'Starts tomorrow':`Starts in ${daysLeft} days`} — ${new Date(n.starts_at).toLocaleDateString()} → ${new Date(n.ends_at).toLocaleDateString()}</div></div>`;
}

// Ticker
const tItems=[...bids,...bids].slice(0,30).map((b,i)=>`<span style="display:inline-flex;align-items:center;gap:5px;padding:0 14px;font-size:12px;white-space:nowrap">${b.is_winner?'<span style="color:#d97706">🏆</span>':'<span style="width:5px;height:5px;border-radius:50%;background:rgba(99,102,241,.4);display:inline-block"></span>'}<span style="color:#475569;font-weight:500">${pName(b.product_id)}</span><span style="color:#4f46e5;font-weight:700;font-family:monospace">${b.bid_price.toLocaleString()}</span><span style="color:#94a3b8;font-size:10px">${t('etb')}</span><span style="color:#e2e8f0">·</span><span style="color:#64748b;font-size:11px">${sName(b.supplier_id)}</span></span>`).join('');
if(bids.length)document.getElementById('ticker').style.display='block',document.getElementById('ticker').innerHTML=`<div style="display:flex;gap:0;padding:7px 0;white-space:nowrap;animation:tic 35s linear infinite;width:fit-content">${tItems}</div>`;

let html='';

// HERO CARD — Today's Status
const todayProductNames=[...uniqueProds].map(pid=>pName(pid)).join(', ')||'—';
html+=`<div class="hero"><div class="hero-label">📊 ${t('todayStatus')} — ${new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})}</div><div class="hero-value">${todayBids.length.toLocaleString()}</div><div class="hero-sub"><span class="hero-stat"><strong>${todayWinners.length}</strong> ${t('winners')}</span><span class="hero-stat"><strong>${avgPrice||0}</strong> ${t('etb')} avg price</span><span class="hero-stat"><strong>${uniqueProds.size}</strong> ${t('products')}</span><span class="hero-stat"><strong>${uniqueSupps.size}</strong> ${t('suppliers')}</span><span class="hero-stat"><strong>${totalVolume.toLocaleString()}</strong> kg volume</span><span class="hero-stat">${t('updated')} ${new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})}</span></div><div class="hero-sub" style="margin-top:10px"><span class="hero-stat"><strong>${t('activeNow')}:</strong> ${activeCycles.length?activeCycles.map(c=>c.cycle_name).join(', '):'—'}</span><span class="hero-stat"><strong>${t('todayProducts')}:</strong> ${todayProductNames}</span></div></div>`;

// Next Bid Schedule + Active Cycles Summary
html+=nextSchedule||'';

// 4 stat cards
html+=`<div class="stats">`;
[{icon:'📊',label:t('allBids'),val:todayBids.length.toLocaleString(),sub:`${todayWinners.length} ${t('winners')}`},{icon:'📦',label:t('products'),val:uniqueProds.size.toLocaleString(),sub:`${products.length} ${t('total')}`},{icon:'👥',label:t('suppliers'),val:uniqueSupps.size.toLocaleString(),sub:`${suppliers.length} ${t('registered')}`},{icon:'⚡',label:t('cycles'),val:activeCycles.length.toString(),sub:`${cycles.length} ${t('total')}`}].map(s=>{
html+=`<div class="stat-card"><div class="stat-icon">${s.icon}</div><div class="stat-label">${s.label}</div><div class="stat-value">${s.val}</div><div class="stat-sub">${s.sub}</div></div>`;});
html+='</div>';

// Recent bids at top
const recentBids=bids.slice(0,15);
if(recentBids.length){
html+=`<div class="section"><div class="section-head"><span>📋</span><span class="section-title">${t('recentBids')}</span></div><table><tr><th>${t('product')}</th><th>${t('supplier')}</th><th>${t('source')}</th><th>${t('location')}</th><th>${t('price')}</th><th>${t('damage')}</th><th>${t('payment')}</th></tr><tbody>`;
recentBids.forEach(b=>{
html+=`<tr><td><span class="name">${pName(b.product_id)}</span><br><span class="muted">${new Date(b.created_at).toLocaleDateString()}</span></td><td><span class="name">${sName(b.supplier_id)}</span></td><td>${b.source_name?`<span class="badge badge-loc">📍 ${b.source_name}</span>`:'<span class="muted">—</span>'}</td><td>${locLabel(b.sourcing_location)}</td><td><span class="price">${b.bid_price.toLocaleString()}</span><span class="muted"> ${t('etb')}</span></td><td>${b.damage_type?`<span class="badge badge-type">${b.damage_type}</span>`:'<span class="muted">—</span>'}</td><td><span class="muted">${b.payment_term||'—'}d</span></td></tr>`;
});
html+='</tbody></table></div>';}

// Source summary
const sourceAgg={};
todayBids.forEach(b=>{const k=b.sourcing_location||'unknown'; sourceAgg[k]=(sourceAgg[k]||0)+1;});
const sourceRows=Object.entries(sourceAgg);
if(sourceRows.length){
html+=`<div class="section"><div class="section-head"><span>🧭</span><span class="section-title">${t('sourceSummary')}</span></div><table><tr><th>${t('location')}</th><th style="text-align:right">${t('todayBids')}</th></tr><tbody>`;
sourceRows.forEach(([k,v])=>{html+=`<tr><td><span class="name">${locLabel(k)}</span></td><td style="text-align:right"><span class="price">${v}</span></td></tr>`});
html+='</tbody></table></div>';
}

// Cycle/product comparison
const cycleName=activeCycles.length?activeCycles[0].cycle_name:'—';
const productCompare={};
todayBids.forEach(b=>{const k=b.product_id; if(!productCompare[k]) productCompare[k]={count:0,min:b.bid_price,max:b.bid_price}; productCompare[k].count++; productCompare[k].min=Math.min(productCompare[k].min,b.bid_price); productCompare[k].max=Math.max(productCompare[k].max,b.bid_price);});
const compareRows=Object.entries(productCompare);
if(compareRows.length){
html+=`<div class="section"><div class="section-head"><span>⚖️</span><span class="section-title">${t('cycleCompare')} — ${cycleName}</span></div><table><tr><th>${t('product')}</th><th style="text-align:right">${t('todayBids')}</th><th style="text-align:right">Min</th><th style="text-align:right">Max</th></tr><tbody>`;
compareRows.forEach(([pid,row])=>{html+=`<tr><td><span class="name">${pName(pid)}</span></td><td style="text-align:right">${row.count}</td><td style="text-align:right"><span class="price">${row.min}</span></td><td style="text-align:right"><span class="price">${row.max}</span></td></tr>`});
html+='</tbody></table></div>';
}

// Winners table with sourcing info
const recentWinners=winners.slice(0,10);
html+=`<div class="section"><div class="section-head"><span>🏆</span><span class="section-title">${t('latestWinners')}</span></div>`;
if(recentWinners.length){
html+=`<table><tr><th>${t('product')}</th><th>${t('supplier')}</th><th>${t('source')}</th><th>${t('location')}</th><th>${t('volume')}</th><th>${t('price')}</th><th>${t('payment')}</th><th style="text-align:right">${t('status')}</th></tr><tbody>`;
recentWinners.forEach(w=>{
html+=`<tr><td><span class="name">${pName(w.product_id)}</span><br><span class="muted">${new Date(w.created_at).toLocaleDateString()}</span></td><td><span class="name">${sName(w.supplier_id)}</span></td><td>${w.source_name?`<span class="badge badge-loc">📍 ${w.source_name}${w.source_region?', '+w.source_region:''}</span>`:'<span class="muted">—</span>'}</td><td>${locLabel(w.sourcing_location)}</td><td><span class="muted">${w.volume?w.volume.toLocaleString()+' kg':'—'}</span></td><td><span class="price">${w.bid_price.toLocaleString()}</span><span class="muted"> ${t('etb')}</span></td><td><span class="muted">${w.payment_term||'—'}d</span></td><td style="text-align:right"><span class="badge badge-win">🏆 ${lang==='en'?'Win':'አሸናፊ'}</span></td></tr>`;
});
html+='</tbody></table>';}else{html+=`<div style="text-align:center;padding:40px;color:#94a3b8">${t('noData')}</div>`;}
html+='</div>';

// Bid volume chart
const volMap={};const cutoff=Date.now()-14*864e5;
bids.filter(b=>new Date(b.created_at).getTime()>=cutoff).forEach(b=>{const d=b.created_at.slice(5,10);volMap[d]=(volMap[d]||0)+1;});
const volData=Object.entries(volMap).sort(([a],[b])=>a.localeCompare(b)).slice(-12);
if(volData.length){const maxV=Math.max(...volData.map(d=>d[1]),1);
html+=`<div class="section"><div class="section-head"><span>📈</span><span class="section-title">${t('bidVol')}</span></div><div class="vol-bar">${volData.map(d=>`<div class="vol-bar-item" style="height:${(d[1]/maxV)*100}%" title="${d[1]} bids"></div>`).join('')}</div><div class="vol-labels">${volData.map(d=>`<span>${d[0].slice(3)}</span>`).join('')}</div></div>`;}

// Active cycles
if(activeCycles.length){
html+=`<div class="section"><div class="section-head"><span>⚡</span><span class="section-title">${t('cycleProgress')}</span></div><div style="padding:16px 20px;display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px">`;
activeCycles.forEach(c=>{
const total=Math.max(1,(new Date(c.ends_at).getTime()-new Date(c.starts_at).getTime())/864e5);
const left=Math.max(0,Math.ceil((new Date(c.ends_at).getTime()-now)/864e5));
const pct=Math.min(100,((total-left)/total)*100);
html+=`<div><div style="display:flex;justify-content:space-between;align-items:center"><span style="font-weight:600;color:#0f172a;font-size:13px">${c.cycle_name}</span><span style="font-size:10px;color:#6366f1;font-weight:600">${left}d ${t('remaining')}</span></div><div class="progress-bg"><div class="progress-fill" style="width:${pct}%"></div></div><div style="display:flex;justify-content:space-between;font-size:9px;color:#94a3b8;margin-top:4px"><span>${c.starts_at.slice(5,10)}</span><span>${pct.toFixed(0)}%</span><span>${c.ends_at.slice(5,10)}</span></div></div>`;
});
html+='</div></div>';}

// Supplier leaderboard
const lb={};bids.forEach(b=>{if(!lb[b.supplier_id])lb[b.supplier_id]={bids:0,wins:0,volume:0};lb[b.supplier_id].bids++;if(b.is_winner){lb[b.supplier_id].wins++;lb[b.supplier_id].volume+=b.volume||0;}});
const leaderboard=Object.entries(lb).map(([id,v])=>({id:+id,...v,rate:v.bids?(v.wins/v.bids)*100:0})).filter(r=>r.bids>0).sort((a,b)=>b.wins-a.wins).slice(0,10);
const medals=['🥇','🥈','🥉'];
if(leaderboard.length){
html+=`<div class="section"><div class="section-head"><span>🏅</span><span class="section-title">${t('supplierRank')}</span></div><table><tr><th class="medal">#</th><th>${t('supplier')}</th><th style="text-align:right">${t('allBids')}</th><th style="text-align:right">${t('wins')}</th><th style="text-align:right">${t('volume')}</th><th style="text-align:right">Win Rate</th></tr><tbody>`;
leaderboard.forEach((r,i)=>{
html+=`<tr><td><span class="medal">${i<3?medals[i]:i+1}</span></td><td><span class="name">${sName(r.id)}</span></td><td style="text-align:right;color:#64748b">${r.bids}</td><td style="text-align:right;color:#0f172a;font-weight:600">${r.wins}</td><td style="text-align:right;color:#64748b">${r.volume?(r.volume/1000).toFixed(1)+'K':'—'}</td><td style="text-align:right"><span style="color:#16a34a;font-weight:700">${r.rate.toFixed(0)}%</span></td></tr>`;
});
html+='</tbody></table></div>';}

html+='<footer>Bid Supply — Real-time transparency</footer>';
document.getElementById('app').innerHTML=html;
}
function toggleLang(){lang=lang==='en'?'am':'en';document.querySelector('.lang-btn').textContent=lang==='en'?'🇬🇧 EN':'🇪🇹 አማ';render();}
load();setInterval(load,60000);
</script>
</body>
</html>
